<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alsol L1 - Gerar ordem de serviço</title>

    <link rel="shortcut icon" href="./logoalsol.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">
        <header>
            <h1>Ordem de serviço</h1>
            <div class="stepper-header">
                <div class="step-indicator active" data-step="1">1</div>
                <div class="step-line"></div>
                <div class="step-indicator" data-step="2">2</div>
                <div class="step-line"></div>
                <div class="step-indicator" data-step="3">3</div>
                <div class="step-line"></div>
                <div class="step-indicator" data-step="4">4</div>
            </div>
            <div class="tabs">
                <button class="tab-btn active" data-tab="fibra">Fibra</button>
                <button class="tab-btn" data-tab="radio">Rádio</button>
            </div>
        </header>

        <main>
            <form id="os-form">
                <!-- STEP 1: IDENTIFICAÇÃO -->
                <div class="step active" id="step-1">
                    <div class="form-grid">
                        <div class="input-group full-width">
                            <label>Mensagem do cliente</label>
                            <div class="radio-group-container">
                                <!-- Fibra Msg -->
                                <div class="radio-group type-fibra" id="fibra-msg">
                                    <label><input type="radio" name="fibra-msg" value="SEM SERVIÇO" checked> Sem
                                        Serviço</label>
                                    <label><input type="radio" name="fibra-msg" value="SERVIÇO COM INSTABILIDADE">
                                        Instabilidade</label>
                                    <label><input type="radio" name="fibra-msg" value="OUTRO"> Outro</label>
                                </div>
                                <!-- Radio Msg -->
                                <div class="radio-group type-radio" id="radio-msg" style="display: none;">
                                    <label><input type="radio" name="radio-msg" value="SEM SERVIÇO" checked> Sem
                                        Serviço</label>
                                    <label><input type="radio" name="radio-msg" value="SERVIÇO COM INSTABILIDADE">
                                        Instabilidade</label>
                                    <label><input type="radio" name="radio-msg" value="OUTRO"> Outro</label>
                                </div>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Nome do Solicitante</label>
                            <input type="text" id="common-nome" placeholder="Nome do solicitante">
                        </div>
                        <div class="input-group">
                            <label>Contato Cliente</label>
                            <input type="text" id="common-contato" placeholder="(XX) XXXXX-XXXX">
                        </div>

                        <div class="input-group">
                            <label>Endereço Atualizado?</label>
                            <div class="radio-group" id="end-doc">
                                <label><input type="radio" name="end-doc" value="SIM" checked> Sim</label>
                                <label><input type="radio" name="end-doc" value="NÃO"> Não</label>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Contato Atualizado?</label>
                            <div class="radio-group" id="cont-doc">
                                <label><input type="radio" name="cont-doc" value="SIM" checked> Sim</label>
                                <label><input type="radio" name="cont-doc" value="NÃO"> Não</label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- STEP 2: DADOS TÉCNICOS -->
                <div class="step" id="step-2">
                    <!-- FIBRA DATA -->
                    <div class="form-grid type-fibra">
                        <div class="input-group">
                            <label>Tipo de Conexão</label>
                            <div class="radio-group" id="fibra-tipo">
                                <label><input type="radio" name="fibra-tipo" value="FTTH" checked> FTTH</label>
                                <label><input type="radio" name="fibra-tipo" value="SERVIÇO DE TV"> TV</label>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Status</label>
                            <div class="radio-group" id="fibra-status">
                                <label class="status-online"><input type="radio" name="fibra-status" value="ONLINE"
                                        checked> Online</label>
                                <label class="status-offline"><input type="radio" name="fibra-status" value="OFFLINE">
                                    Offline</label>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Sinal Cliente (dBm)</label>
                            <input type="text" id="fibra-sinal-cliente" placeholder="-22.00">
                        </div>
                        <div class="input-group">
                            <label>Sinal CTO (dBm)</label>
                            <input type="text" id="fibra-sinal" placeholder="-20.50">
                        </div>
                        <div class="input-group full-width">
                            <label>Alarmes na ONU?</label>
                            <div class="alarm-row">
                                <div class="radio-group" id="fibra-alarmes">
                                    <label><input type="radio" name="fibra-alarmes" value="SIM"> Sim</label>
                                    <label><input type="radio" name="fibra-alarmes" value="NÃO" checked> Não</label>
                                </div>
                                <div class="checkbox-group horizontal" id="fibra-alarmes-types">
                                    <label><input type="checkbox" id="LINKLOSS"> LINK LOSS</label>
                                    <label><input type="checkbox" id="RXLOWPOWER"> RX LOW</label>
                                    <label><input type="checkbox" id="DYINGGASP"> DYING GASP</label>
                                </div>
                            </div>
                        </div>
                        <div class="input-group full-width">
                            <label>Diagnóstico Principal</label>
                            <select id="fibra-diagnostico">
                                <option value="">Selecione...</option>
                                <option value="lentidao">Lentidão</option>
                                <option value="sem_conexao">Sem conexão</option>
                                <option value="ping_instavel">Ping Instável</option>
                                <option value="tracert_instavel">Tracert Instável</option>
                                <option value="oscilacao">Oscilação</option>
                                <option value="queda">Queda constante</option>
                                <option value="roteador">Problema no roteador</option>
                                <option value="sinal_optico">Sinal óptico baixo</option>
                            </select>
                        </div>
                    </div>

                    <!-- RADIO DATA -->
                    <div class="form-grid type-radio" style="display: none;">
                        <div class="input-group">
                            <label>Tipo de Conexão</label>
                            <div class="radio-group" id="radio-tipo">
                                <label><input type="radio" name="radio-tipo" value="WIRELESS" checked> Wireless</label>
                                <label><input type="radio" name="radio-tipo" value="SERVIÇO DE TV"> TV</label>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Status</label>
                            <div class="radio-group" id="radio-status">
                                <label class="status-online"><input type="radio" name="radio-status" value="ONLINE"
                                        checked> Online</label>
                                <label class="status-offline"><input type="radio" name="radio-status" value="OFFLINE">
                                    Offline</label>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Sinal Rádio (dBm)</label>
                            <input type="text" id="radio-sinal" placeholder="-65.00">
                        </div>
                        <div class="input-group">
                            <label>Vinculado?</label>
                            <div class="radio-group" id="radio-vinculado">
                                <label><input type="radio" name="radio-vinculado" value="SIM" checked> Sim</label>
                                <label><input type="radio" name="radio-vinculado" value="NÃO"> Não</label>
                            </div>
                        </div>
                        <div class="input-group full-width">
                            <label>Diagnóstico Principal</label>
                            <select id="radio-diagnostico">
                                <option value="">Selecione...</option>
                                <option value="radio_lento_oscilando">Lentidão / Oscilação</option>
                                <option value="radio_sem_servico">Sem serviço / Queda</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- STEP 3: FINALIZAÇÃO -->
                <div class="step" id="step-3">
                    <div class="form-grid">
                        <div class="input-group full-width">
                            <label>Relato do Cliente</label>
                            <textarea id="common-problema" rows="2" placeholder="Descreva o problema..."></textarea>
                        </div>
                        <div class="input-group full-width">
                            <label>Ações Realizadas (Nível 1)</label>
                            <div class="checkbox-group horizontal">
                                <label><input type="checkbox" id="check-reiniciado"> Reiniciado equip.</label>
                                <label><input type="checkbox" id="check-config"> Config. roteador</label>
                                <label><input type="checkbox" id="check-doc"> Verif. documentação</label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- STEP 4: RESULTADO -->
                <div class="step" id="step-4">
                    <section class="output-section" style="margin-top: 0;">
                        <div class="output-container">
                            <pre id="output-text-primary"></pre>
                            <button type="button" id="copy-btn-primary" class="copy-btn">Copiar Nota</button>
                        </div>
                        <div class="output-container">
                            <pre id="output-text-secondary"></pre>
                            <button type="button" id="copy-btn-secondary" class="copy-btn">Copiar Cliente</button>
                        </div>
                    </section>
                </div>

                <!-- NAVIGATION -->
                <div class="nav-buttons">
                    <button type="button" id="prev-btn" class="secondary-btn"
                        style="visibility: hidden;">Voltar</button>
                    <button type="button" id="next-btn" class="copy-btn">Próximo</button>
                    <button type="button" id="clean-btn" class="secondary-btn"
                        style="margin-left: auto;">Limpar</button>
                </div>
            </form>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
